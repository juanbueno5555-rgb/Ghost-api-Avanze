server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/techcup_auth
    username: techcup
    password: techcup_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:techcup-dev-jwt-secret-key-minimum-256-bits-long-for-hs256}
    access-token-expiration: 900000   # 15 minutes in ms
    refresh-token-expiration: 604800000  # 7 days in ms

  otp:
    length: 6
    expiration-minutes: 10
    max-attempts: 5
    resend-cooldown-seconds: 60

  rate-limit:
    registration-per-minute: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
