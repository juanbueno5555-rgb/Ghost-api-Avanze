version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: techcup-db
    environment:
      POSTGRES_USER: techcup
      POSTGRES_PASSWORD: techcup_dev
      POSTGRES_DB: techcup_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techcup"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
