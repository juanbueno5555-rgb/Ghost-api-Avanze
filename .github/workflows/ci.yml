name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techcup
          POSTGRES_PASSWORD: techcup_dev
          POSTGRES_DB: techcup_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U techcup
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        run: mvn clean verify --batch-mode

      - name: JaCoCo report
        run: |
          find . -path "*/target/site/jacoco/index.html" -exec echo "Report: {}" \;
